<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt phòng Khách sạn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">

        <div class="d-flex justify-content-between align-items-center mt-3 mb-4 border-bottom pb-2">
            <h2>Tạo Đơn Đặt Phòng Mới</h2>
            <div>
                <a href="/login.html" class="btn btn-outline-primary">Đăng nhập / Đăng ký</a>
                <button class="btn btn-outline-secondary" onclick="logout()">Đăng xuất</button>
            </div>
        </div>
        <form id="bookingForm">
            <div class="mb-3">
                <label class="form-label">Loại phòng:</label><br>
                <input type="radio" name="roomType" value="Standard" checked> Standard
                <input type="radio" name="roomType" value="Suite" class="ms-3"> Suite
            </div>

            <div id="suiteFields" class="hidden dynamic-field mb-3">
                <label>Tên Quản gia:</label>
                <input type="text" id="butlerName" class="form-control">
                <label class="mt-2">Mã thẻ VIP:</label>
                <input type="text" id="vipCard" class="form-control">
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="hasAirportTransfer">
                <label class="form-check-label">Đưa đón sân bay</label>
            </div>

            <div id="flightFields" class="hidden dynamic-field mb-3">
                <label>Số hiệu chuyến bay:</label>
                <input type="text" id="flightNumber" class="form-control">
            </div>

            <button type="button" class="btn btn-primary" onclick="handleFormSubmit()">Xác nhận đặt</button>
        </form>
    </div>

    <script src="js/dynamic-ui.js"></script>
    <script src="js/api.js"></script>
    <script>
        // THÊM MỚI: Hàm xử lý đăng xuất
        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            alert("Đã đăng xuất!");
            window.location.reload(); // Tải lại trang sau khi đăng xuất
        }

        async function handleFormSubmit() {
            // 1. LẤY DỮ LIỆU TỪ GIAO DIỆN (DOM)
            const roomType = document.querySelector('input[name="roomType"]:checked').value;
            const hasAirportTransfer = document.getElementById('hasAirportTransfer').checked;
            const flightNumber = document.getElementById('flightNumber').value;

            // 2. TẠO DỮ LIỆU CHUNG (Payload)
            const bookingData = {
                bookingId: 'BK' + Date.now(),
                checkInDate: new Date().toISOString(),
                amount: roomType === 'Suite' ? 5000000 : 1000000,
                hasAirportTransfer: hasAirportTransfer,
                flightNumber: hasAirportTransfer ? flightNumber : null
            };

            // 3. BỔ SUNG DỮ LIỆU RIÊNG THEO TỪNG LOẠI PHÒNG
            if (roomType === 'Suite') {
                bookingData.butlerName = document.getElementById('butlerName').value;
                bookingData.vipCardNumber = document.getElementById('vipCard').value;
            } else {
                bookingData.cleaningFee = 150000;
            }

            // 4. GỌI HÀM SUBMIT XUỐNG BACKEND
            console.log("Dữ liệu gửi đi:", bookingData);
            await submitBooking(bookingData, roomType);
        }
    </script>
</body>
</html>
