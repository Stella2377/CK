<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập / Đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding-top: 50px;
            background-color: #f8f9fa;
        }

        .auth-container {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container auth-container">
        <ul class="nav nav-tabs mb-3" id="authTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login" type="button">Đăng nhập</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#register" type="button">Đăng ký</button>
            </li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="login">
                <div class="mb-3">
                    <label>Tài khoản</label>
                    <input type="text" id="loginUsername" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Mật khẩu</label>
                    <input type="password" id="loginPassword" class="form-control">
                </div>
                <button class="btn btn-primary w-100" onclick="handleLogin()">Đăng nhập</button>
            </div>

            <div class="tab-pane fade" id="register">
                <div class="mb-3">
                    <label>Tài khoản</label>
                    <input type="text" id="regUsername" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Mật khẩu</label>
                    <input type="password" id="regPassword" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Vai trò</label>
                    <select id="regRole" class="form-select">
                        <option value="User">Khách hàng (User)</option>
                        <option value="Admin">Quản trị viên (Admin)</option>
                    </select>
                </div>
                <button class="btn btn-success w-100" onclick="handleRegister()">Đăng ký</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();
            if (res.ok) {
                alert('Đăng nhập thành công!');
                // Điều hướng dựa trên Role
                window.location.href = data.role === 'Admin' ? '/admin.html' : '/index.html';
            } else {
                alert('Lỗi: ' + data.error);
            }
        }

        async function handleRegister() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, role })
            });

            const data = await res.json();
            if (res.ok) {
                alert('Đăng ký thành công! Bạn có thể đăng nhập ngay bây giờ.');
                document.querySelector('[data-bs-target="#login"]').click(); // Chuyển sang tab đăng nhập
            } else {
                alert('Lỗi: ' + data.error);
            }
        }
    </script>
</body>
</html>
