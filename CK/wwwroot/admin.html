<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Quản lý Đặt Phòng (Admin)</h2>
        <button class="btn btn-warning mb-3" onclick="loginAdmin()">1. Đăng nhập Admin</button>
        <button class="btn btn-info mb-3" onclick="loadBookings()">2. Tải danh sách</button>
        <table class="table table-bordered mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Mã Đặt Phòng</th>
                    <th>Loại phòng</th>
                    <th>Ngày Check-in</th>
                    <th>Trạng thái</th>
                    <th>Quản gia / Mã VIP</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
            </tbody>
        </table>
    </div>

    <div class="modal fade" id="updateModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Cập nhật đơn phòng</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="updateBookingId">
                    <div class="mb-3">
                        <label>Trạng thái</label>
                        <select id="updateStatus" class="form-select">
                            <option value="Pending">Pending</option>
                            <option value="Paid">Paid</option>
                            <option value="CheckedIn">CheckedIn</option>
                            <option value="CheckedOut">CheckedOut</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label>Phân bổ quản gia (Chỉ hiển thị nếu là Suite)</label>
                        <input type="text" id="updateButler" class="form-control" placeholder="Tên quản gia">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="submitUpdate()">Lưu cập nhật</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }

        // Hàm loadBookings tự động chạy khi mở trang (nếu đã đăng nhập):
        window.onload = () => {
            loadBookings();
        };

        async function loadBookings() {
            const res = await fetchWithAuth('/bookings');
            if (!res.ok) return;
            const data = await res.json();

            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '';

            data.forEach(b => {
                // Xử lý hiển thị thông tin nhạy cảm
                let extraInfo = '';
                if (b.roomType === 'Suite') {
                    extraInfo = `Quản gia: ${b.butlerName || 'Chưa có'}<br>VIP Card: <span class="text-danger fw-bold">${b.vipCardNumber || 'Bảo mật'}</span>`;
                } else {
                    extraInfo = `Phí dọn dẹp: ${b.cleaningFee}`;
                }

                tbody.innerHTML += `
                        <tr class="${b.status === 'SoftDeleted' ? 'table-secondary text-muted' : ''}">
                            <td>${b.bookingId}</td>
                            <td><span class="badge bg-secondary">${b.roomType}</span></td>
                            <td>${new Date(b.checkInDate).toLocaleString()}</td>
                            <td><span class="badge bg-info">${b.status}</span></td>
                            <td>${extraInfo}</td>
                            <td>
                                <button class="btn btn-sm btn-primary" onclick="openUpdateModal('${b.bookingId}', '${b.status}', '${b.butlerName || ''}')">Sửa</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteBooking('${b.bookingId}')">Xóa mềm</button>
                            </td>
                        </tr>
                    `;
            });
        }

        function openUpdateModal(id, status, butler) {
            document.getElementById('updateBookingId').value = id;
            document.getElementById('updateStatus').value = status;
            document.getElementById('updateButler').value = butler;
            new bootstrap.Modal(document.getElementById('updateModal')).show();
        }

        // GỌI API HTTP PUT XUỐNG BACKEND (Vấn đề 2)
        async function submitUpdate() {
            const id = document.getElementById('updateBookingId').value;
            const status = document.getElementById('updateStatus').value;
            const butlerName = document.getElementById('updateButler').value;

            const res = await fetchWithAuth(`/bookings/${id}/admin`, {
                method: 'PUT',
                body: JSON.stringify({ status, butlerName })
            });

            if (res.ok) {
                alert('Cập nhật thành công!');
                bootstrap.Modal.getInstance(document.getElementById('updateModal')).hide();
                loadBookings();
            }
        }

        async function deleteBooking(id) {
            if (confirm('Bạn có chắc muốn xóa mềm đơn này?')) {
                const res = await fetchWithAuth(`/bookings/${id}`, { method: 'DELETE' });
                if (res.ok) loadBookings();
            }
        }
    </script>
</body>
</html>
